{% extends "base.html" %}
{% load static %}
{% block title %}{% endblock title %}
{% block 'content' %}
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .form-container a {
            display: block;
            margin: 15px 0;
            color: white;
            text-decoration: underline;
            font-size: 18px;
        }
        .form-container a:hover {
            color: #007bff;
        }
    </style>
</head>
<body>

<div class="form-container">
    <a href="{% url 'root:password_reset_request' %}">Reset Password</a>
    <br>
    <a href="{% url 'root:change_profile_icon' %}">Change Icon</a>
</div>

</body>
</html>
{% endblock 'content' %}
